# Publishes wheels and npm packages when you push a SemVer tag (vX.Y.Z).
# Configure PyPI Trusted Publishing + npm automation token / OIDC before first release.
# This workflow does NOT run on untagged pushes.

name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

permissions:
  contents: read
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate versions & changelog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: sync-versions --check
        run: node scripts/sync-versions.mjs --check

      - name: CHANGELOG gate (Unreleased must have sections)
        run: grep -qE '^### (Added|Changed|Fixed|Removed)' CHANGELOG.md

  build-python:
    name: Build & publish PyPI wheel
    runs-on: ubuntu-latest
    needs: validate
    environment:
      name: pypi
      url: https://pypi.org/p/phantomat/
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.88
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: Widget assets (maturin include)
        shell: bash
        run: bash scripts/build_widget.sh

      - name: Build wheels (maturin)
        uses: PyO3/maturin-action@v1
        with:
          command: build
          working-directory: python
          args: --release -o ../target/wheels
          manylinux: "2014"
          rust-toolchain: "1.88"

      - name: Publish to PyPI (Trusted Publisher / OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: target/wheels/
          print-hash: true

  publish-npm:
    name: Publish @phantomat/core to npm
    runs-on: ubuntu-latest
    needs: validate
    environment:
      name: npm
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.88
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: wasm-pack
        run: cargo install wasm-pack --version 0.13.1 --locked

      - name: Build wasm pkg
        run: wasm-pack build --target web --release crates/phantomat-wasm

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: pnpm install & build
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter @phantomat/core build

      - name: npm publish (@phantomat/core — configure NPM_TOKEN secret)
        working-directory: packages/core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
