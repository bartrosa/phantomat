name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: fmt (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.88
        with:
          components: rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt
        run: cargo fmt --all -- --check

  clippy:
    name: clippy (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.88
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.88

      - uses: Swatinem/rust-cache@v2

      - name: cargo test
        run: cargo test --workspace --exclude phantomat-renderer --exclude phantomat-layers

  gpu-test:
    name: gpu (${{ matrix.os }} / ${{ matrix.backend }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            backend: lavapipe
          - os: macos-latest
            backend: metal
          - os: windows-latest
            backend: warp
    runs-on: ${{ matrix.os }}
    env:
      RUST_BACKTRACE: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.88

      - uses: Swatinem/rust-cache@v2

      - name: Install Mesa Lavapipe (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y mesa-vulkan-drivers vulkan-tools

      - name: cargo test phantomat-renderer + phantomat-layers (Linux)
        if: matrix.os == 'ubuntu-latest'
        env:
          VK_ICD_FILENAMES: /usr/share/vulkan/icd.d/lvp_icd.x86_64.json
        run: |
          cargo test -p phantomat-renderer --release
          cargo test -p phantomat-layers --release

      - name: cargo test phantomat-renderer + phantomat-layers (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          cargo test -p phantomat-renderer --release
          cargo test -p phantomat-layers --release

      - name: cargo test phantomat-renderer + phantomat-layers (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cargo test -p phantomat-renderer --release --features dx12
          cargo test -p phantomat-layers --release --features dx12

  bench-check:
    name: bench (--no-run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.88

      - uses: Swatinem/rust-cache@v2

      - name: cargo bench --no-run
        run: cargo bench --workspace --no-run

  wasm-test:
    name: wasm (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.88
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: cargo install wasm-pack --version 0.13.1 --locked

      - name: Install browsers (Chrome + Firefox for headless tests)
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser firefox

      - name: wasm-pack test (Chrome)
        env:
          CHROME_BIN: /usr/bin/chromium-browser
        run: wasm-pack test --headless --chrome crates/phantomat-wasm

      - name: wasm-pack test (Firefox)
        run: wasm-pack test --headless --firefox crates/phantomat-wasm

      - name: wasm-pack release build + gzip size guard (< 2 MiB)
        run: |
          cd crates/phantomat-wasm
          wasm-pack build --target web --release
          ls -la pkg/phantomat_wasm_bg.wasm
          gzip -c pkg/phantomat_wasm_bg.wasm | wc -c
          test $(gzip -c pkg/phantomat_wasm_bg.wasm | wc -c) -lt 2000000

  npm-test:
    name: npm (core)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.88
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: cargo install wasm-pack --version 0.13.1 --locked

      - name: Build phantomat-wasm pkg
        run: |
          cd crates/phantomat-wasm
          wasm-pack build --target web --release

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate IPC fixture (Arrow regression tests)
        run: |
          python -m pip install pyarrow numpy
          python scripts/generate_fixtures.py

      - name: @phantomat/core (build, test, typecheck, size)
        working-directory: packages/core
        run: |
          pnpm run build
          pnpm test
          pnpm run test:arrow
          pnpm typecheck
          pnpm size

  python-wheels:
    name: python (${{ matrix.os }} / ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.88
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install Vulkan (Linux / Lavapipe)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y mesa-vulkan-drivers vulkan-tools

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install wasm-pack (widget build)
        run: cargo install wasm-pack --version 0.13.1 --locked

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build Jupyter widget assets (maturin include)
        shell: bash
        run: bash scripts/build_widget.sh

      - name: Build wheel (maturin)
        uses: PyO3/maturin-action@v1
        with:
          command: build
          working-directory: python
          args: --release -o ../target/wheels
          manylinux: "2014"
          rust-toolchain: "1.88"

      - name: Install wheel + test deps
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest hypothesis Pillow "numpy>=1.24" pyarrow
          python -m pip install target/wheels/phantomat-*.whl

      - name: Generate parity fixtures
        run: python scripts/generate_fixtures.py

      - name: pytest
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            export VK_ICD_FILENAMES=/usr/share/vulkan/icd.d/lvp_icd.x86_64.json
          fi
          pytest python/tests -v

  notebook-test:
    name: notebook (nbval)
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.88
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: cargo install wasm-pack --version 0.13.1 --locked

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build Jupyter widget static assets
        run: bash scripts/build_widget.sh

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Vulkan (Lavapipe)
        run: |
          sudo apt-get update
          sudo apt-get install -y mesa-vulkan-drivers vulkan-tools

      - name: maturin develop + pytest nbval
        env:
          VK_ICD_FILENAMES: /usr/share/vulkan/icd.d/lvp_icd.x86_64.json
        run: |
          python -m pip install --upgrade pip
          python -m pip install maturin pytest nbval jupyter ipykernel
          cd python && maturin develop --release && cd ..
          python -m pytest python/tests/test_anywidget_transport.py -v
          python -m pytest --nbval-lax examples/python/quickstart.ipynb -v
