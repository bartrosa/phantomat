<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Phantomat WASM demo</title>
    <script type="importmap">
      {
        "imports": {
          "@phantomat/core": "../../node_modules/@phantomat/core/dist/index.es.js",
          "phantomat-wasm": "../../node_modules/phantomat-wasm/phantomat_wasm.js"
        }
      }
    </script>
    <style>
      body {
        margin: 0;
        background: #111;
        color: #ccc;
        font-family: system-ui, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 1rem;
      }
      canvas {
        display: block;
        border: 1px solid #333;
        background: #000;
      }
    </style>
  </head>
  <body>
    <p>
      Scatter layer (10k points). At repo root: <code>pnpm install</code>,
      <code>pnpm --filter @phantomat/core build</code>, then serve the repository root so
      <code>../../node_modules/...</code> in the import map resolves (e.g. open
      <code>/examples/web/index.html</code> from that server).
    </p>
    <canvas id="c" width="800" height="600"></canvas>
    <script type="module" src="./main.js"></script>
  </body>
</html>
